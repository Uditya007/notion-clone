appId: com.cora.workspace
productName: Cora
copyright: Copyright © 2025 Cora

directories:
  output: dist-electron
  buildResources: electron/assets

files:
  - electron/**/*
  - next.config.*
  - package.json

mac:
  category: public.app-category.productivity
  target:
    - target: dmg
      arch: [x64, arm64]
    - target: zip
      arch: [x64, arm64]
  darkModeSupport: true
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: electron/entitlements.mac.plist
  entitlementsInherit: electron/entitlements.mac.plist

dmg:
  title: Cora Workspace
  icon: electron/assets/icon.icns
  window:
    width: 660
    height: 400
  contents:
    - x: 180
      y: 170
      type: file
    - x: 480
      y: 170
      type: link
      path: /Applications
